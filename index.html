<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet</title>
    <!--Link to the css-->
    <link rel="stylesheet" type="text/css" href="style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;600;800&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar-container">
        <div class="nav-container-son-2 navbar-title-container">
            <a href="index.html"><h1 class="navbar-title">Wallet</h1></a>
        </div>
        <div class="nav-links-container nav-container-son-1 ">
            <a class="nav-link">Home</a>
            <a class="nav-link">Accounts</a>
            <a class="nav-link">Income / Outcome</a>
            <a class="nav-link">Resume</a>
            <a class="nav-link">Graph</a>
            <a class="nav-link">About</a>
        </div>
        <div class="lang-container nav-container-son-2 ">
            <button>Lang</button>
            <div style="display: none;">
                <span>English</span>
                <span>Spanish</span>
            </div>
        </div>
    </nav>
    <section id="pgm-container">
        <div id="home-pgm-son" class="home-grid-son">
            <h2 class="money-title">Money Ammount</h2>
            <div class="money-container">
                <span class="money-ammount">000000.000</span>
            </div>
        </div>
        <div id="home-pgm-son-2" class="home-grid-son">
            <h2 class="account-title">Account</h2>
            <div class="account-container">
                <span class="account-desc">Salary</span>
                <button class="account-arrow-btn"><i class="fa-solid fa-chevron-down"></i></button>
                <div>

                </div>
            </div>
        </div>
        <div id="home-pgm-son-3" class="home-grid-son">
            
        </div>
        <div id="home-pgm-son-4" class="home-grid-son">
            <h2>Income / Outcome</h2>
            <div class="outcome-income">
                <button class="outcome-pay-btn">Pay</button>
                <span class="outcome-desc">HiperMas</span>
                <button class="outcome-arrow-btn"><i class="fa-solid fa-chevron-down"></i></button>
                <div>

                </div>
            </div>
            <div class="outcome-income">
                <button class="outcome-pay-btn">Pay</button>
                <span class="outcome-desc">OSE</span>
                <button class="outcome-arrow-btn"><i class="fa-solid fa-chevron-down"></i></button>
                <div>

                </div>
            </div>
            <div class="outcome-income">
                <button class="income-send-btn">Send</button>
                <span class="income-desc">Salary</span>
                <button class="income-arrow-btn"><i class="fa-solid fa-chevron-down"></i></button>
                <div>

                </div>
            </div>
        </div>
        <div id="home-pgm-son-5" class="home-grid-son">
            <button id="movement-btn">Register new movement</button>
        </div>
    </section>
    <script src="https://kit.fontawesome.com/8b8d9c44f6.js" crossorigin="anonymous"></script>
</body>
</html>
